<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サーシャと触手の国情報wiki　敵ステータス</title>
    <meta name="description" content="サーシャと触手の国の情報wikiです。敵のステータス、ドロップ品、弱点などを掲載しています。">
    <link rel="stylesheet" type="text/css" href="../css/headerStyle.css"/>
    <link rel="stylesheet" type="text/css" href="enemyStatusData.css"/>
    <link rel="stylesheet" type="text/css" href="../css/table.css"/>
</head>

<body bgcolor="#dadada">
    
    <div class="headerButtonRow header">
    </div>

    <div class="selectDungeonButtonRow">
    <button class="selectDungeonButton" id="ForestButton">森</button>
    <button class="selectDungeonButton" id="MountainButton">山</button>
    <button class="selectDungeonButton" id="DesertButton">砂漠</button>
    <button class="selectDungeonButton" id="SnowfieldButton">雪原</button>
    <button class="selectDungeonButton" id="CemeteryButton">墓地</button>
    <button class="selectDungeonButton" id="VolcanoButton">火山</button>
    <button class="selectDungeonButton" id="CoalMineButton">炭鉱</button>
    <button class="selectDungeonButton" id="UnderwaterButton">海底</button>
    <button class="selectDungeonButton" id="BlackShipButton">黒船</button>
    <button class="selectDungeonButton" id="WorkshopButton">工房</button>
    </div>

    <form style="margin-top: 110px; margin-left: 183px;" onsubmit="return false;">
        <div style="font-size: 17px; line-height: 1.6em;">
            [1 + サーシャのレベル / 2]が敵のレベル(救出イベントによる戦闘では[1 + サーシャのレベル / 2 + サーシャのレベル / 2])<br>
            ※小数点以下は切り捨て<br><br>
            指定したサーシャのレベルの時の敵のステータスを表示<br>
            <label for="message">サーシャのレベル</label>
            <input type="number" id="level" min="1" max="99" style="width: 70px; height: 30px;" value="1">
        </div>
    </form>

    <div class="arrayItemData"></div>

    <script src="../js/header.js"></script>
    <script src="enemyStatusData.js"></script>
</body>
